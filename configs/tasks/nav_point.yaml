name: nav_point
max_steps: 400
dt: 0.02

goal:
  type: point
  standoff: 0.0
  random:
    x: [1.5, 4.0]
    y: [-2.0, 2.0]

success:
  distance_lt: 0.35

reset:
  base: { x: 0.0, y: 0.0, yaw: 0.0 }
  randomize:
    base_x: [-0.4, 0.4]
    base_y: [-0.4, 0.4]
    base_yaw: [-0.25, 0.25]

reward:
  progress: 2.0
  time: -0.005
  success: 15.0
  out_of_bounds: -10.0

limits:
  arena_half: 15.0
