# P3-C3-3：HIL 批量评估套件（场景引用 configs/tasks/registry.yaml）
default_policy: runs/nav_ppo/full/nav_policy.onnx
default_episodes: 3

suites:
  core:
    description: Rule / hybrid / RL baseline (direct brain selection)
    episodes: 3
    scenarios:
      - name: rule_push
        task_id: push_red_box
        brain: rule
      - name: hybrid_push
        task_id: push_red_box
        brain: hybrid
      - name: rl_nav
        task_id: nav_to_box_red
        brain: rl

  planner_auto:
    description: Planner + brain=auto (C2 end-to-end)
    episodes: 2
    scenarios:
      - name: auto_push
        task_id: push_red_box
        brain: auto
        planner_backend: llm_mock
        task_text: 帮我把红箱子推远一点
      - name: auto_nav
        task_id: nav_to_box_red
        brain: auto
        planner_backend: llm_mock
        task_text: please go to the red box

  quick:
    description: Fast smoke — 1 episode per scenario
    episodes: 1
    scenarios:
      - name: rule_push
        task_id: push_red_box
        brain: rule
      - name: auto_push
        task_id: push_red_box
        brain: auto
        planner_backend: llm_mock
